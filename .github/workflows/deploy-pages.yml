name: Deploy "Lift and Coast" to GitHub Pages

# The site in web/ is a static, zero-build artifact (index.html + styles.css +
# app.js + the generated data.js). This workflow just uploads web/ and deploys it.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# least-privilege token scoped for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-flight deploy finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable via Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
